<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Console Helper</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
      width: 220px;
      background-color: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
    }
    h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      color: #a6e3a1;
      text-align: center;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 13px;
      text-align: center;
    }
    input {
      padding: 10px;
      background: #313244;
      border: 2px solid #45475a;
      border-radius: 8px;
      color: #f38ba8;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #89b4fa;
      background: #181825;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #a6e3a1;
      text-align: center;
      height: 15px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h3>Shortcut Settings</h3>
  <div class="input-group">
    <label for="keyInput">Click below and press a new key:</label>
    <input type="text" id="keyInput" maxlength="1" placeholder="K" readonly />
  </div>
  <div class="status" id="statusMsg"></div>
  <script src="popup.js"></script>
</body>
</html>
